<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open ecosystem platform for strong agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7F2"/>
      <stop offset="1" stop-color="#EAF1ED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#101312" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="980" rx="28" fill="url(#bg)"/>

  <text x="84" y="98" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">Building the Open Ecosystem Platform for Strong Agents</text>
  <text x="84" y="142" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="26">Infrastructure, skills, benchmarks, applications, and community growth on one common platform</text>

  <rect x="84" y="182" width="260" height="54" rx="27" fill="#0F8B7B"/>
  <text x="214" y="216" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Platform Foundation</text>

  <rect x="364" y="182" width="214" height="54" rx="27" fill="#1F6FEB"/>
  <text x="471" y="216" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Skill Platform</text>

  <rect x="598" y="182" width="286" height="54" rx="27" fill="#E45F3C"/>
  <text x="741" y="216" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Application Platform</text>

  <rect x="904" y="182" width="280" height="54" rx="27" fill="#B7CF57"/>
  <text x="1044" y="216" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Benchmark + Exchange</text>

  <g filter="url(#shadow)">
    <rect x="84" y="286" width="1432" height="164" rx="22" fill="white"/>
    <rect x="84" y="286" width="1432" height="10" rx="5" fill="#101312"/>
    <text x="124" y="340" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Ecosystem Platform Layer</text>
    <text x="124" y="378" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="22">Multiple product, research, and community tracks grow on top of the same shared platform</text>

    <rect x="124" y="394" width="220" height="36" rx="18" fill="#EAF3F0"/>
    <text x="234" y="418" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Auto Research</text>

    <rect x="362" y="394" width="278" height="36" rx="18" fill="#EEF4FF"/>
    <text x="501" y="418" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Reliable Agentic Systems</text>

    <rect x="658" y="394" width="196" height="36" rx="18" fill="#FFF0EA"/>
    <text x="756" y="418" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Agentic RL</text>

    <rect x="872" y="394" width="214" height="36" rx="18" fill="#F1F5DE"/>
    <text x="979" y="418" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Skill Platform</text>

    <rect x="1104" y="394" width="180" height="36" rx="18" fill="#F4ECE8"/>
    <text x="1194" y="418" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Benchmark</text>

    <rect x="1302" y="394" width="174" height="36" rx="18" fill="#EDEDEE"/>
    <text x="1389" y="418" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Community</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="492" width="1432" height="272" rx="24" fill="#101312"/>
    <text x="124" y="550" fill="#F5F7F5" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">Common Platform Layer</text>
    <text x="124" y="590" fill="#AEB8B2" font-family="Inter, Arial, sans-serif" font-size="23">This is the operating platform. The graph runtime is only one subsystem inside a larger ecosystem platform.</text>

    <rect x="124" y="626" width="216" height="108" rx="18" fill="white"/>
    <text x="232" y="670" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Controllers</text>
    <text x="232" y="702" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">Sessions, tools,</text>
    <text x="232" y="724" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">permissions, streams</text>

    <rect x="352" y="626" width="216" height="108" rx="18" fill="white"/>
    <text x="460" y="670" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Operators</text>
    <text x="460" y="702" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">Execution contract</text>
    <text x="460" y="724" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">across strong agents</text>

    <rect x="580" y="626" width="216" height="108" rx="18" fill="white"/>
    <text x="688" y="670" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Skill Platform</text>
    <text x="688" y="702" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">Reusable skills,</text>
    <text x="688" y="724" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">references, scripts</text>

    <rect x="808" y="626" width="216" height="108" rx="18" fill="white"/>
    <text x="916" y="670" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">A2A Protocol</text>
    <text x="916" y="702" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">Messages, handoffs,</text>
    <text x="916" y="724" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">artifacts, tool outputs</text>

    <rect x="1036" y="626" width="216" height="108" rx="18" fill="white"/>
    <text x="1144" y="670" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">State + Runtime</text>
    <text x="1144" y="702" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">Scheduling, checkpoints,</text>
    <text x="1144" y="724" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">resume, trace, recovery</text>

    <rect x="1264" y="626" width="216" height="108" rx="18" fill="white"/>
    <text x="1372" y="670" text-anchor="middle" fill="#101312" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Graph Runtime</text>
    <text x="1372" y="702" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">One core subsystem</text>
    <text x="1372" y="724" text-anchor="middle" fill="#4B5750" font-family="Inter, Arial, sans-serif" font-size="16">inside the platform</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="804" width="1432" height="110" rx="24" fill="#171B19"/>
    <text x="124" y="854" fill="#F5F7F5" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Strong Agents</text>
    <text x="124" y="888" fill="#AEB8B2" font-family="Inter, Arial, sans-serif" font-size="22">Claude Code · Codex · OpenClaw · future operators with tools, sessions, and long-running execution</text>
  </g>

  <path d="M800 450V492" stroke="#101312" stroke-width="4" stroke-linecap="round"/>
  <path d="M800 764V804" stroke="#101312" stroke-width="4" stroke-linecap="round"/>
  <circle cx="800" cy="450" r="6" fill="#101312"/>
  <circle cx="800" cy="492" r="6" fill="#101312"/>
</svg>
